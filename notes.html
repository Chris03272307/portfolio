<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习笔记 | Chris</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #00ff88; --secondary: #00ccff; --accent: #ff00aa; --bg: #050507; --bg-card: #0f0f12; --text: #ffffff; --text-gray: #6b7280; --x: 50%; --y: 50%; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; cursor: none; }
        
        .mouse-glow { position: fixed; width: 800px; height: 800px; top: 0; left: 0; transform: translate(-50%, -50%); pointer-events: none; z-index: 0; background: radial-gradient(circle, rgba(0,255,136,0.15) 0%, rgba(0,204,255,0.08) 30%, transparent 70%); mix-blend-mode: screen; }
        .cursor { width: 20px; height: 20px; border: 2px solid var(--primary); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); mix-blend-mode: difference; }
        .cursor-dot { width: 4px; height: 4px; background: var(--primary); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); }
        
        .app { display: flex; min-height: 100vh; }
        
        .sidebar { width: 260px; background: var(--bg-card); border-right: 1px solid rgba(255,255,255,0.05); padding: 30px 20px; position: fixed; height: 100vh; overflow-y: auto; z-index: 100; }
        .sidebar-logo { font-size: 1.3rem; font-weight: 700; margin-bottom: 30px; padding: 0 10px; }
        .sidebar-logo a { color: var(--text); text-decoration: none; }
        .sidebar-logo span { color: var(--primary); }
        
        .nav-section { margin-bottom: 30px; }
        .nav-title { font-size: 0.7rem; color: var(--text-gray); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; padding: 0 10px; }
        
        .nav-item { display: block; padding: 10px 12px; color: var(--text-gray); text-decoration: none; border-radius: 8px; transition: all 0.3s; margin-bottom: 5px; font-size: 0.9rem; }
        .nav-item:hover, .nav-item.active { background: rgba(0,255,136,0.1); color: var(--primary); }
        
        .category-list, .tag-list, .archive-list { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 10px; }
        .category-tag { padding: 6px 12px; background: rgba(255,255,255,0.05); border-radius: 20px; font-size: 0.75rem; color: var(--text-gray); cursor: pointer; transition: all 0.3s; }
        .category-tag:hover, .category-tag.active { background: var(--primary); color: #000; }
        
        .main-content { flex: 1; margin-left: 260px; padding: 30px 40px; position: relative; z-index: 10; }
        .page-header { margin-bottom: 40px; }
        .page-title { font-size: 2rem; font-weight: 700; margin-bottom: 10px; }
        .page-subtitle { color: var(--text-gray); font-size: 0.9rem; }
        
        .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        
        .note-card { background: var(--bg-card); border-radius: 16px; padding: 25px; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s; cursor: pointer; position: relative; overflow: hidden; }
        .note-card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: linear-gradient(180deg, var(--primary), var(--secondary)); }
        .note-card:hover { transform: translateY(-5px); border-color: rgba(0,255,136,0.3); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        
        .note-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .note-category { padding: 4px 10px; background: rgba(0,204,255,0.1); color: var(--secondary); border-radius: 6px; font-size: 0.7rem; }
        .note-date { color: var(--text-gray); font-size: 0.75rem; }
        .note-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 10px; line-height: 1.4; }
        .note-summary { color: var(--text-gray); font-size: 0.85rem; line-height: 1.6; margin-bottom: 15px; }
        .note-tags { display: flex; gap: 8px; flex-wrap: wrap; }
        .note-tag { padding: 4px 10px; background: rgba(255,0,170,0.1); color: var(--accent); border-radius: 4px; font-size: 0.65rem; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,5,7,0.98); z-index: 2000; overflow-y: auto; }
        .modal.active { display: block; }
        .modal-content { max-width: 800px; margin: 50px auto; padding: 40px; background: var(--bg-card); border-radius: 20px; position: relative; }
        .modal-close { position: fixed; top: 20px; right: 30px; width: 50px; height: 50px; background: var(--bg-card); border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; color: var(--text); font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
        .modal-close:hover { border-color: var(--primary); color: var(--primary); }
        
        .modal-meta { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; }
        .modal-category { padding: 6px 14px; background: rgba(0,204,255,0.15); color: var(--secondary); border-radius: 8px; font-size: 0.8rem; }
        .modal-date { color: var(--text-gray); font-size: 0.85rem; }
        .modal-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 10px; }
        
        .modal-tags { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .modal-tag { padding: 6px 12px; background: rgba(255,0,170,0.1); color: var(--accent); border-radius: 6px; font-size: 0.75rem; }
        
        .modal-body { color: var(--text-gray); line-height: 1.9; }
        .modal-body h1, .modal-body h2, .modal-body h3 { color: var(--text); margin: 30px 0 15px; }
        .modal-body h1 { font-size: 1.5rem; }
        .modal-body h2 { font-size: 1.2rem; }
        .modal-body h3 { font-size: 1.1rem; }
        .modal-body p { margin-bottom: 15px; }
        .modal-body ul, .modal-body ol { margin: 15px 0; padding-left: 25px; }
        .modal-body li { margin-bottom: 8px; }
        .modal-body code { background: rgba(0,255,136,0.1); color: var(--primary); padding: 2px 8px; border-radius: 4px; font-family: monospace; }
        .modal-body pre { background: #000; padding: 20px; border-radius: 12px; overflow-x: auto; margin: 15px 0; }
        .modal-body pre code { background: none; padding: 0; }
        
        .back-btn { position: fixed; bottom: 30px; left: 30px; padding: 12px 24px; background: var(--bg-card); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; color: var(--text); text-decoration: none; font-size: 0.85rem; z-index: 3000; transition: all 0.3s; }
        .back-btn:hover { border-color: var(--primary); color: var(--primary); transform: translateX(-5px); }
        
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding: 20px; }
            .notes-grid { grid-template-columns: 1fr; }
            .cursor, .cursor-dot { display: none; }
            body { cursor: auto; }
            .back-btn { bottom: 20px; left: 20px; }
        }
    </style>
</head>
<body>
    <div class="mouse-glow" id="mouseGlow"></div>
    <div class="cursor"></div>
    <div class="cursor-dot"></div>
    
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-logo"><a href="index.html"><span>&lt;</span>Chris<span>/&gt;</span></a></div>
            
            <div class="nav-section">
                <div class="nav-title">目录</div>
                <a href="#" class="nav-item active" data-filter="all">全部笔记</a>
            </div>
            
            <div class="nav-section">
                <div class="nav-title">分类</div>
                <div class="category-list" id="categoryList"></div>
            </div>
            
            <div class="nav-section">
                <div class="nav-title">标签</div>
                <div class="tag-list" id="tagList"></div>
            </div>
            
            <div class="nav-section">
                <div class="nav-title">归档</div>
                <div class="archive-list" id="archiveList"></div>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">📝 学习笔记</h1>
                <p class="page-subtitle">记录学习历程，持续更新中...</p>
            </div>
            
            <div class="notes-grid" id="notesGrid"></div>
        </main>
    </div>
    
    <div class="modal" id="articleModal">
        <button class="modal-close" onclick="closeModal()">×</button>
        <div class="modal-content">
            <div class="modal-meta">
                <span class="modal-category" id="modalCategory"></span>
                <span class="modal-date" id="modalDate"></span>
            </div>
            <h1 class="modal-title" id="modalTitle"></h1>
            <div class="modal-tags" id="modalTags"></div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>
    
    <a href="index.html" class="back-btn">← 返回首页</a>
    
    <script src="notes.js"></script>
    <script>
        const cursor = document.querySelector('.cursor'), cursorDot = document.querySelector('.cursor-dot');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px';
            cursorDot.style.left = e.clientX + 'px'; cursorDot.style.top = e.clientY + 'px';
            const mouseGlow = document.getElementById('mouseGlow');
            if(mouseGlow) { mouseGlow.style.left = e.clientX + 'px'; mouseGlow.style.top = e.clientY + 'px'; }
        });
        
        const categories = [...new Set(notes.map(n => n.category))];
        const allTags = [...new Set(notes.flatMap(n => n.tags))];
        const archives = {};
        notes.forEach(n => { const m = n.date.substring(0,7); if(!archives[m]) archives[m]=[]; archives[m].push(n); });
        
        const categoryList = document.getElementById('categoryList');
        categoryList.innerHTML = `<span class="category-tag active" data-filter="all">全部</span>` + categories.map(c => `<span class="category-tag" data-filter="${c}">${c}</span>`).join('');
        
        const tagList = document.getElementById('tagList');
        tagList.innerHTML = allTags.map(t => `<span class="category-tag" data-filter-tag="${t}">#${t}</span>`).join('');
        
        const archiveList = document.getElementById('archiveList');
        archiveList.innerHTML = Object.keys(archives).sort().reverse().map(m => `<span class="category-tag" data-filter-date="${m}">${m}</span>`).join('');
        
        function renderNotes(filter = 'all', filterType = 'category') {
            let filtered = notes;
            if (filter !== 'all') {
                if (filterType === 'category') filtered = notes.filter(n => n.category === filter);
                else if (filterType === 'tag') filtered = notes.filter(n => n.tags.includes(filter));
                else if (filterType === 'date') filtered = notes.filter(n => n.date.startsWith(filter));
            }
            document.getElementById('notesGrid').innerHTML = filtered.slice().reverse().map(note => `
                <div class="note-card" onclick="openArticle(${note.id})">
                    <div class="note-card-header">
                        <span class="note-category">${note.category}</span>
                        <span class="note-date">${note.date}</span>
                    </div>
                    <h3 class="note-title">${note.title}</h3>
                    <p class="note-summary">${note.summary}</p>
                    <div class="note-tags">${note.tags.map(t => `<span class="note-tag">${t}</span>`).join('')}</div>
                </div>
            `).join('');
        }
        
        document.querySelectorAll('.category-tag').forEach(tag => {
            tag.addEventListener('click', () => {
                document.querySelectorAll('.category-tag').forEach(t => t.classList.remove('active'));
                tag.classList.add('active');
                renderNotes(tag.dataset.filterTag || tag.dataset.filterDate || tag.dataset.filter, tag.dataset.filterTag ? 'tag' : (tag.dataset.filterDate ? 'date' : 'category'));
            });
        });
        
        function openArticle(id) {
            const note = notes.find(n => n.id === id);
            if(!note) return;
            document.getElementById('modalCategory').textContent = note.category;
            document.getElementById('modalDate').textContent = note.date;
            document.getElementById('modalTitle').textContent = note.title;
            document.getElementById('modalTags').innerHTML = note.tags.map(t => `<span class="modal-tag">#${t}</span>`).join('');
            document.getElementById('modalBody').innerHTML = marked(note.content);
            document.getElementById('articleModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closeModal() { document.getElementById('articleModal').classList.remove('active'); document.body.style.overflow = 'auto'; }
        document.getElementById('articleModal').addEventListener('click', (e) => { if(e.target.id === 'articleModal') closeModal(); });
        document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeModal(); });
        
        function marked(text) {
            return text.replace(/^### (.*$)/gm, '<h3>$1</h3>').replace(/^## (.*$)/gm, '<h2>$1</h2>').replace(/^# (.*$)/gm, '<h1>$1</h1>')
                .replace(/\*\*(.*)\*\*/g, '<strong>$1</strong>').replace(/\*(.*)\*/g, '<em>$1</em>')
                .replace(/`([^`]+)`/g, '<code>$1</code>').replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                .replace(/^- (.*$)/gm, '<li>$1</li>').replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>').replace(/\n/g, '<br>');
        }
        
        renderNotes();
    </script>
</body>
</html>
