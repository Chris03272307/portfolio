<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习笔记 | Chris</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00ff88;
            --secondary: #00ccff;
            --accent: #ff00aa;
            --bg: #050507;
            --bg-card: #0f0f12;
            --text: #ffffff;
            --text-gray: #6b7280;
            --mouse-x: 0.5;
            --mouse-y: 0.5;
        }

        body {
            font-family: 'Outfit', 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            cursor: none;
        }

        .cursor {
            width: 20px;
            height: 20px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            mix-blend-mode: difference;
        }

        .cursor-dot {
            width: 4px;
            height: 4px;
            background: var(--primary);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
        }

        .bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            pointer-events: none;
            transition: transform 0.3s ease-out;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: var(--primary);
            top: -200px;
            left: -200px;
            transform: translate(calc(var(--mouse-x) * 200px), calc(var(--mouse-y) * 200px));
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: var(--secondary);
            bottom: -200px;
            right: -200px;
            transform: translate(calc(var(--mouse-x) * -150px), calc(var(--mouse-y) * -150px));
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 25px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(5, 5, 7, 0.8);
            backdrop-filter: blur(20px);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .logo a {
            color: var(--text);
            text-decoration: none;
        }

        .logo span {
            color: var(--primary);
        }

        .nav-links {
            display: flex;
            gap: 40px;
        }

        .nav-links a {
            color: var(--text-gray);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .nav-links a.active {
            color: var(--primary);
        }

        .main {
            padding: 150px 50px 80px;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        .header h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 700;
            margin-bottom: 15px;
        }

        .header h1 span {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-gray);
            font-size: 1.1rem;
        }

        .filters {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 50px;
        }

        .filter-btn {
            padding: 10px 24px;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: var(--text-gray);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn:hover, .filter-btn.active {
            border-color: var(--primary);
            color: var(--primary);
        }

        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
        }

        .note-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .note-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transform: scaleX(0);
            transition: transform 0.3s;
        }

        .note-card:hover {
            transform: translateY(-8px);
            border-color: rgba(0, 255, 136, 0.3);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .note-card:hover::before {
            transform: scaleX(1);
        }

        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .note-category {
            padding: 5px 12px;
            background: rgba(0, 204, 255, 0.1);
            color: var(--secondary);
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .note-date {
            color: var(--text-gray);
            font-size: 0.8rem;
        }

        .note-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .note-summary {
            color: var(--text-gray);
            font-size: 0.9rem;
            margin-bottom: 20px;
            line-height: 1.7;
        }

        .note-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .note-tag {
            padding: 5px 10px;
            background: rgba(255, 0, 170, 0.1);
            color: var(--accent);
            border-radius: 6px;
            font-size: 0.7rem;
        }

        /* Article Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 7, 0.95);
            z-index: 1000;
            overflow-y: auto;
            padding: 50px;
        }

        .modal.active {
            display: block;
        }

        .modal-content {
            max-width: 800px;
            margin: 0 auto;
            background: var(--bg-card);
            border-radius: 24px;
            padding: 50px;
            position: relative;
        }

        .modal-close {
            position: fixed;
            top: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            color: var(--text);
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .modal-close:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .modal-header {
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .modal-category {
            display: inline-block;
            padding: 5px 12px;
            background: rgba(0, 204, 255, 0.1);
            color: var(--secondary);
            border-radius: 8px;
            font-size: 0.75rem;
            margin-bottom: 15px;
        }

        .modal-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .modal-date {
            color: var(--text-gray);
        }

        .modal-body {
            color: var(--text-gray);
            line-height: 1.9;
        }

        .modal-body h1, .modal-body h2, .modal-body h3 {
            color: var(--text);
            margin: 30px 0 15px;
        }

        .modal-body h1 { font-size: 1.6rem; }
        .modal-body h2 { font-size: 1.3rem; }
        .modal-body h3 { font-size: 1.1rem; }

        .modal-body p {
            margin-bottom: 15px;
        }

        .modal-body ul, .modal-body ol {
            margin: 15px 0;
            padding-left: 25px;
        }

        .modal-body li {
            margin-bottom: 8px;
        }

        .modal-body code {
            background: rgba(0, 255, 136, 0.1);
            color: var(--primary);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'Space Grotesk', monospace;
        }

        .modal-body pre {
            background: #000;
            padding: 20px;
            border-radius: 12px;
            overflow-x: auto;
            margin: 15px 0;
        }

        .modal-body pre code {
            background: none;
            padding: 0;
        }

        footer {
            padding: 50px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.03);
        }

        footer p {
            color: var(--text-gray);
            font-size: 0.85rem;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-gray);
        }

        @media (max-width: 768px) {
            nav { padding: 20px; }
            .main { padding: 120px 20px 60px; }
            .notes-grid { grid-template-columns: 1fr; }
            .modal { padding: 20px; }
            .modal-content { padding: 30px; }
            .cursor, .cursor-dot { display: none; }
            body { cursor: auto; }
        }
    </style>
</head>
<body>
    <div class="cursor"></div>
    <div class="cursor-dot"></div>

    <div class="bg-canvas">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <nav>
        <div class="logo"><a href="index.html"><span>&lt;</span>Chris<span>/&gt;</span></a></div>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="notes.html" class="active">笔记</a>
        </div>
    </nav>

    <main>
        <div class="header">
            <h1>学习 <span>笔记</span></h1>
            <p>记录学习历程，记录成长</p>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="自动驾驶">自动驾驶</button>
            <button class="filter-btn" data-filter="AI">AI</button>
            <button class="filter-btn" data-filter="工具">工具</button>
        </div>

        <div class="notes-grid" id="notesGrid">
            <!-- Notes will be rendered here -->
        </div>

        <div class="empty-state" id="emptyState" style="display: none;">
            暂无笔记
        </div>
    </main>

    <!-- Article Modal -->
    <div class="modal" id="articleModal">
        <button class="modal-close" onclick="closeModal()">×</button>
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-category" id="modalCategory"></span>
                <h1 class="modal-title" id="modalTitle"></h1>
                <p class="modal-date" id="modalDate"></p>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <footer>
        <p>© 2026 Chris · <a href="https://github.com/Chris03272307">GitHub</a></p>
    </footer>

    <script src="notes.js"></script>
    <script>
        // Custom Cursor
        const cursor = document.querySelector('.cursor');
        const cursorDot = document.querySelector('.cursor-dot');

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            cursorDot.style.left = e.clientX + 'px';
            cursorDot.style.top = e.clientY + 'px';
        });

        document.addEventListener('mouseleave', () => {
            cursor.style.opacity = '0';
            cursorDot.style.opacity = '0';
        });

        document.addEventListener('mouseenter', () => {
            cursor.style.opacity = '1';
            cursorDot.style.opacity = '1';
        });

        // Mouse-follow for orbs
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            document.documentElement.style.setProperty('--mouse-x', x);
            document.documentElement.style.setProperty('--mouse-y', y);
        });

        // Render Notes
        const notesGrid = document.getElementById('notesGrid');
        const emptyState = document.getElementById('emptyState');
        let currentFilter = 'all';

        function renderNotes(filter = 'all') {
            currentFilter = filter;
            const filteredNotes = filter === 'all' 
                ? notes 
                : notes.filter(n => n.category === filter);
            
            if (filteredNotes.length === 0) {
                notesGrid.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            notesGrid.style.display = 'grid';
            emptyState.style.display = 'none';
            
            notesGrid.innerHTML = filteredNotes.map(note => `
                <div class="note-card" onclick="openArticle(${note.id})">
                    <div class="note-header">
                        <span class="note-category">${note.category}</span>
                        <span class="note-date">${note.date}</span>
                    </div>
                    <h3 class="note-title">${note.title}</h3>
                    <p class="note-summary">${note.summary}</p>
                    <div class="note-tags">
                        ${note.tags.map(tag => `<span class="note-tag">${tag}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderNotes(btn.dataset.filter);
            });
        });

        // Article Modal
        const modal = document.getElementById('articleModal');

        function openArticle(id) {
            const note = notes.find(n => n.id === id);
            if (!note) return;

            document.getElementById('modalCategory').textContent = note.category;
            document.getElementById('modalTitle').textContent = note.title;
            document.getElementById('modalDate').textContent = note.date;
            document.getElementById('modalBody').innerHTML = marked(note.content);
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // Simple Markdown Parser
        function marked(text) {
            return text
                .replace(/^# (.*$)/gm, '<h1>$1</h1>')
                .replace(/^## (.*$)/gm, '<h2>$1</h2>')
                .replace(/^### (.*$)/gm, '<h3>$1</h3>')
                .replace(/\*\*(.*)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*)\*/g, '<em>$1</em>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                .replace(/^- (.*$)/gm, '<li>$1</li>')
                .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
                .replace(/\n/g, '<br>');
        }

        // Initialize
        renderNotes();
    </script>
</body>
</html>
